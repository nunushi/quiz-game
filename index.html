<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>迫りくるクイズ</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d1a;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      color: white;
      touch-action: manipulation;
    }

    /* ===== SCREENS ===== */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .screen.hidden { display: none; }

    /* ===== START ===== */
    #start-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
    }

    .game-title {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #a78bfa 30%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .game-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.6;
    }

    .btn-primary {
      margin-top: 24px;
      padding: 16px 52px;
      font-size: 1.25rem;
      font-weight: bold;
      font-family: inherit;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 6px 28px rgba(124,58,237,0.5);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-primary:active { transform: scale(0.96); box-shadow: 0 3px 14px rgba(124,58,237,0.4); }

    .btn-secondary {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: bold;
      font-family: inherit;
      background: transparent;
      color: #a78bfa;
      border: 2px solid #7c3aed;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: transform 0.12s, background 0.12s;
    }
    .btn-secondary:active { transform: scale(0.96); background: rgba(124,58,237,0.15); }

    /* ===== REGISTER SCREEN ===== */
    #register-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
      padding: 0 28px;
      text-align: center;
    }

    .reg-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 360px;
    }
    .reg-block.hidden { display: none; }

    .user-id-box {
      font-family: 'Courier New', monospace;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: bold;
      letter-spacing: 0.08em;
      color: #fbbf24;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(167,139,250,0.4);
      border-radius: 14px;
      padding: 16px 20px;
      width: 100%;
      word-break: break-all;
    }

    .recover-input {
      width: 100%;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: white;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 14px 10px;
      outline: none;
    }
    .recover-input:focus { border-color: #818cf8; }

    .reg-switch {
      margin-top: 4px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      text-decoration: underline;
      cursor: pointer;
    }

    .current-id-display {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    /* ===== GAME SCREEN ===== */
    #game-screen {
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }

    /* --- Question area (top 50%) --- */
    .question-area {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(180deg, #0f1a3d 0%, #131c38 100%);
      overflow: hidden;
      transition: box-shadow 0.4s;
    }
    .question-area.danger {
      box-shadow: inset 0 0 60px rgba(239,68,68,0.25);
      animation: dangerPulse 0.6s ease-in-out infinite;
    }
    @keyframes dangerPulse {
      0%,100% { box-shadow: inset 0 0 40px rgba(239,68,68,0.15); }
      50%      { box-shadow: inset 0 0 70px rgba(239,68,68,0.35); }
    }

    /* Timer label — above question text, hidden until ≤5s */
    .timer-label {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(2.2rem, 9vw, 3.8rem);
      font-weight: 900;
      color: #ff4444;
      text-shadow: 0 0 25px rgba(255,68,68,0.9), 0 0 55px rgba(255,68,68,0.4);
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
      z-index: 5;
    }
    .timer-label.show {
      opacity: 1;
      animation: timerBeat 0.55s ease-in-out infinite;
    }
    @keyframes timerBeat {
      0%,100% { transform: translateX(-50%) scale(1);   }
      50%      { transform: translateX(-50%) scale(1.12); }
    }

    /* Question counter top-right */
    .q-counter {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      font-weight: bold;
      z-index: 5;
    }

    /* Question text with rush animation */
    .question-text {
      font-size: clamp(1.15rem, 4.5vw, 1.7rem);
      font-weight: bold;
      text-align: center;
      padding: 16px 28px;
      line-height: 1.45;
      transform-origin: center center;
      max-width: 92%;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    @keyframes questionRush {
      from {
        transform: scale(0.6);
        opacity: 1;
      }
      to {
        transform: scale(3.2);
        opacity: 1;
      }
    }
    .question-text.rushing {
      animation: questionRush 20s linear forwards;
    }

    /* Progress bar */
    .progress-wrap {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 5px;
      background: rgba(255,255,255,0.08);
    }
    .progress-fill {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, #7c3aed, #3b82f6, #ef4444);
    }

    /* --- Choices area (bottom 50%) --- */
    .choices-area {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      background: #0d0d1a;
    }

    .choice-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      color: white;
      font-size: clamp(1rem, 4vw, 1.25rem);
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 6px;
      transition: background 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .choice-btn:active:not(:disabled) { transform: scale(0.95); }

    .choice-btn.selected {
      background: rgba(99,102,241,0.38);
      border-color: #818cf8;
      box-shadow: 0 0 22px rgba(99,102,241,0.55), inset 0 0 12px rgba(99,102,241,0.2);
    }
    .choice-btn.correct {
      background: rgba(16,185,129,0.45);
      border-color: #34d399;
      box-shadow: 0 0 28px rgba(16,185,129,0.65);
    }
    .choice-btn.wrong {
      background: rgba(239,68,68,0.38);
      border-color: #f87171;
      box-shadow: 0 0 22px rgba(239,68,68,0.5);
    }
    .choice-btn:disabled { cursor: default; }

    /* ===== BETWEEN SCREEN ===== */
    #between-screen {
      background: radial-gradient(ellipse at 50% 45%, #1a1a3e 0%, #0d0d1a 65%);
      gap: 10px;
    }

    .between-verdict {
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 0.04em;
    }
    .v-correct { color: #34d399; text-shadow: 0 0 30px rgba(52,211,153,0.7); }
    .v-wrong   { color: #f87171; text-shadow: 0 0 30px rgba(248,113,113,0.7); }

    .between-answer {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      text-align: center;
      min-height: 1.4em;
    }

    .between-next-label {
      margin-top: 16px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    .between-countdown {
      font-size: clamp(3.5rem, 14vw, 6rem);
      font-weight: 900;
      color: #818cf8;
      text-shadow: 0 0 30px rgba(129,140,248,0.6);
    }

    /* ===== RESULT SCREEN ===== */
    #result-screen {
      background: radial-gradient(ellipse at 50% 45%, #1a1a3e 0%, #0d0d1a 65%);
      gap: 8px;
    }

    .result-title {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.05em;
    }
    .result-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
    }
    .result-score {
      font-size: clamp(5rem, 22vw, 9rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #fbbf24, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-denom {
      font-size: 1.4rem;
      color: rgba(255,255,255,0.38);
      margin-top: -4px;
    }
    .result-time {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }
    .result-total-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      margin-top: 16px;
    }
    .result-total {
      font-size: clamp(2.6rem, 10vw, 4rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== RANKING SCREEN ===== */
    #ranking-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
      padding: 16px 20px;
    }

    .ranking-list {
      width: 100%;
      max-width: 340px;
      max-height: 56vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ranking-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 14px;
    }
    .ranking-rank {
      width: 26px;
      flex: 0 0 auto;
      font-weight: 900;
      font-size: 1rem;
      text-align: center;
      color: rgba(255,255,255,0.5);
    }
    .ranking-row:nth-child(1) .ranking-rank { color: #fbbf24; }
    .ranking-row:nth-child(2) .ranking-rank { color: #d1d5db; }
    .ranking-row:nth-child(3) .ranking-rank { color: #f59e0b; }

    .ranking-name {
      flex: 1;
      min-width: 0;
      font-weight: bold;
      font-size: 0.92rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    .ranking-score {
      flex: 0 0 auto;
      font-weight: 900;
      font-size: 1.05rem;
      color: #a78bfa;
    }

    .ranking-empty {
      color: rgba(255,255,255,0.4);
      font-size: 0.95rem;
      padding: 40px 0;
    }
  </style>
</head>
<body>

<!-- ===== REGISTER SCREEN ===== -->
<div id="register-screen" class="screen">
  <div class="game-title" style="font-size:clamp(1.5rem,6vw,2.2rem)">ユーザー登録</div>

  <!-- 初回: 新規ID発行 -->
  <div id="reg-new" class="reg-block hidden">
    <div class="game-sub">
      あなたの専用IDを発行しました。<br>
      次回以降はこのIDで復旧できます。<br>
      必ずメモ・スクリーンショットで保存してください。
    </div>
    <div class="user-id-box" id="reg-new-id"></div>
    <button class="btn-secondary" onclick="copyId('reg-new-id')">IDをコピー</button>
    <input type="text" id="reg-new-name" class="recover-input" style="text-transform:none" placeholder="ユーザー名を入力（任意）" maxlength="12" autocomplete="off">
    <button class="btn-primary" onclick="confirmNewUser()" style="padding:16px 30px;font-size:1.05rem">登録してはじめる</button>
    <div class="reg-switch" onclick="showRecoverMode()">すでにIDをお持ちの方はこちら</div>
  </div>

  <!-- 既存ユーザー -->
  <div id="reg-existing" class="reg-block hidden">
    <div class="game-sub">登録済みのIDが見つかりました。</div>
    <div class="user-id-box" id="reg-existing-id"></div>
    <input type="text" id="reg-existing-name" class="recover-input" style="text-transform:none" placeholder="ユーザー名を入力（任意）" maxlength="12" autocomplete="off">
    <button class="btn-primary" onclick="continueAsExisting()" style="padding:16px 30px;font-size:1.05rem">このIDで続ける</button>
    <div class="reg-switch" onclick="showRecoverMode()">別のIDを使う</div>
  </div>

  <!-- 復旧コード入力 -->
  <div id="reg-recover" class="reg-block hidden">
    <div class="game-sub">お手持ちの復旧コード（ユーザーID）を入力してください。</div>
    <input type="text" id="recover-input" class="recover-input" placeholder="例: QZ-AB12-CD34" autocomplete="off" autocapitalize="characters">
    <input type="text" id="reg-recover-name" class="recover-input" style="text-transform:none" placeholder="ユーザー名を入力（任意）" maxlength="12" autocomplete="off">
    <button class="btn-primary" onclick="recoverUser()" style="padding:16px 30px;font-size:1.05rem">このIDで復旧する</button>
    <div class="reg-switch" onclick="showFreshMode()">新しいIDを発行する</div>
  </div>
</div>

<!-- ===== START SCREEN ===== -->
<div id="start-screen" class="screen hidden">
  <div class="game-title">迫りくるクイズ</div>
  <div class="game-sub">
    制限時間 <strong style="color:#a78bfa">20秒</strong>！<br>
    選択肢をタップして答えよう
  </div>
  <div class="current-id-display" id="current-id-display"></div>
  <button class="btn-primary" onclick="startGame()">ゲームスタート</button>
  <button class="btn-secondary" onclick="showRanking('start-screen')">ランキングを見る</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen hidden">
  <div class="question-area" id="question-area">
    <div class="timer-label" id="timer-label">5</div>
    <span class="q-counter" id="q-counter">1 / 3</span>
    <div class="question-text" id="question-text"></div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="choices-area">
    <button class="choice-btn" id="c0" onclick="tap(0)"></button>
    <button class="choice-btn" id="c1" onclick="tap(1)"></button>
    <button class="choice-btn" id="c2" onclick="tap(2)"></button>
    <button class="choice-btn" id="c3" onclick="tap(3)"></button>
  </div>
</div>

<!-- ===== BETWEEN SCREEN ===== -->
<div id="between-screen" class="screen hidden">
  <div class="between-verdict" id="between-verdict"></div>
  <div class="between-answer" id="between-answer"></div>
  <div class="between-next-label">次の問題まで…</div>
  <div class="between-countdown" id="between-countdown">5</div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-screen" class="screen hidden">
  <div class="result-title">ゲーム終了！</div>
  <div class="result-label">正 答 数</div>
  <div class="result-score" id="result-score">0</div>
  <div class="result-denom" id="result-denom">/ 3 問</div>
  <div class="result-time" id="result-time"></div>
  <div class="result-total-label">総 合 点</div>
  <div class="result-total" id="result-total">0</div>
  <button class="btn-primary" onclick="showScreen('start-screen')" style="margin-top:28px">もう一度</button>
  <button class="btn-secondary" onclick="showRanking('result-screen')">ランキングを見る</button>
</div>

<!-- ===== RANKING SCREEN ===== -->
<div id="ranking-screen" class="screen hidden">
  <div class="game-title" style="font-size:clamp(1.5rem,6vw,2.2rem)">ランキング</div>
  <div class="ranking-list" id="ranking-list"></div>
  <button class="btn-primary" onclick="showScreen(rankingOrigin)" style="margin-top:8px">戻る</button>
</div>

<script>
  /* ===== DATA ===== */
  const QUESTIONS = [
    {
      text: 'たかしくんの出身は？',
      choices: ['東京', '大阪', '名古屋', '札幌'],
      correct: '東京'
    },
    {
      text: '花子ちゃんの好きな食べ物は？',
      choices: ['寿司', '焼肉', 'うどん', 'そば'],
      correct: 'うどん'
    },
    {
      text: 'にしくんの趣味は？',
      choices: ['サッカー', '野球', 'テニス', 'スケート'],
      correct: 'スケート'
    }
  ];

  /* ===== STATE ===== */
  let qIdx     = 0;
  let score    = 0;
  let selected = 0;   // currently highlighted choice index
  let timeLeft = 20;
  let tickId   = null;
  let betweenId = null;
  let submitted = false;
  let startTime = null;  // ゲーム開始ボタン押下時刻（タイムアタック計測用）
  let endTime   = null;  // 最終問題の回答終了時刻
  let rankingOrigin = 'start-screen'; // ランキング画面の「戻る」先

  /* ===== RANKING ===== */
  const RANKING_KEY = 'quiz_rankings';

  function loadRankings() {
    try {
      return JSON.parse(localStorage.getItem(RANKING_KEY) || '[]');
    } catch (e) {
      return [];
    }
  }

  function saveRankingEntry(entry) {
    const list = loadRankings();
    list.push(entry);
    list.sort((a, b) => b.total - a.total);
    localStorage.setItem(RANKING_KEY, JSON.stringify(list.slice(0, 50)));
  }

  function showRanking(origin) {
    rankingOrigin = origin;
    const list = loadRankings().sort((a, b) => b.total - a.total);
    const listEl = document.getElementById('ranking-list');
    listEl.innerHTML = '';

    if (list.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'ranking-empty';
      empty.textContent = 'まだ記録がありません';
      listEl.appendChild(empty);
    } else {
      list.forEach((entry, i) => {
        const row = document.createElement('div');
        row.className = 'ranking-row';

        const rank = document.createElement('span');
        rank.className = 'ranking-rank';
        rank.textContent = `${i + 1}`;

        const name = document.createElement('span');
        name.className = 'ranking-name';
        name.textContent = entry.name;

        const total = document.createElement('span');
        total.className = 'ranking-score';
        total.textContent = entry.total.toFixed(2);

        row.append(rank, name, total);
        listEl.appendChild(row);
      });
    }

    showScreen('ranking-screen');
  }

  /* ===== USER REGISTRATION ===== */
  const USER_ID_KEY   = 'quiz_user_id';
  const USER_NAME_KEY = 'quiz_user_name';
  let currentUserId   = null;
  let currentUserName = '';
  let pendingNewId    = null;

  function genUserId() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 紛らわしい文字(0,O,1,I)を除外
    const seg = () => Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    return `QZ-${seg()}-${seg()}`;
  }

  function regBlock(id) {
    document.querySelectorAll('.reg-block').forEach(b => b.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function initRegister() {
    const existing = localStorage.getItem(USER_ID_KEY);
    if (existing) {
      currentUserId = existing;
      document.getElementById('reg-existing-id').textContent = existing;
      document.getElementById('reg-existing-name').value = localStorage.getItem(USER_NAME_KEY) || '';
      regBlock('reg-existing');
    } else {
      pendingNewId = genUserId();
      document.getElementById('reg-new-id').textContent = pendingNewId;
      regBlock('reg-new');
    }
  }

  function showRecoverMode() {
    regBlock('reg-recover');
    document.getElementById('recover-input').value = '';
    document.getElementById('reg-recover-name').value = '';
    document.getElementById('recover-input').focus();
  }

  function showFreshMode() {
    pendingNewId = genUserId();
    document.getElementById('reg-new-id').textContent = pendingNewId;
    regBlock('reg-new');
  }

  function copyId(elId) {
    const text = document.getElementById(elId).textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).catch(() => {});
    }
  }

  function finishRegistration(id, name) {
    currentUserId   = id;
    currentUserName = name.trim().slice(0, 12) || '名無しさん';
    localStorage.setItem(USER_ID_KEY, currentUserId);
    localStorage.setItem(USER_NAME_KEY, currentUserName);
    document.getElementById('current-id-display').textContent = `${currentUserName}（ID: ${currentUserId}）`;
    showScreen('start-screen');
  }

  function confirmNewUser() {
    finishRegistration(pendingNewId, document.getElementById('reg-new-name').value);
  }
  function continueAsExisting() {
    finishRegistration(currentUserId, document.getElementById('reg-existing-name').value);
  }

  function recoverUser() {
    const val = document.getElementById('recover-input').value.trim().toUpperCase();
    if (!val) {
      alert('復旧コードを入力してください。');
      return;
    }
    finishRegistration(val, document.getElementById('reg-recover-name').value);
  }

  /* ===== HELPERS ===== */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function c(i) { return document.getElementById('c' + i); }

  /* ===== GAME FLOW ===== */
  function startGame() {
    qIdx = 0;
    score = 0;
    startTime = Date.now();
    endTime   = null;
    clearInterval(tickId);
    clearInterval(betweenId);
    showQuestion();
  }

  function showQuestion() {
    submitted = false;
    selected  = 0;
    timeLeft  = 20;

    clearInterval(tickId);
    clearInterval(betweenId);

    const q = QUESTIONS[qIdx];
    showScreen('game-screen');

    /* question counter */
    document.getElementById('q-counter').textContent = `${qIdx + 1} / ${QUESTIONS.length}`;

    /* question text — restart CSS animation */
    const qt = document.getElementById('question-text');
    qt.textContent = q.text;
    qt.classList.remove('rushing');
    void qt.offsetWidth;            // force reflow
    qt.classList.add('rushing');

    /* remove danger glow */
    document.getElementById('question-area').classList.remove('danger');

    /* choices */
    for (let i = 0; i < 4; i++) {
      const el = c(i);
      el.textContent = q.choices[i];
      el.className   = 'choice-btn';
      el.disabled    = false;
    }
    /* default selection: top-left (index 0) */
    c(0).classList.add('selected');

    /* timer label hidden */
    const tl = document.getElementById('timer-label');
    tl.textContent = '';
    tl.classList.remove('show');

    /* progress bar reset → animate */
    const pf = document.getElementById('progress-fill');
    pf.style.transition = 'none';
    pf.style.transform  = 'scaleX(1)';
    void pf.offsetWidth;
    pf.style.transition = 'transform 20s linear';
    pf.style.transform  = 'scaleX(0)';

    /* start countdown */
    tickId = setInterval(tick, 1000);
  }

  function tick() {
    timeLeft--;

    /* show timer when ≤ 5 seconds remain */
    if (timeLeft <= 5 && timeLeft > 0) {
      const tl = document.getElementById('timer-label');
      tl.textContent = timeLeft;
      tl.classList.add('show');
      document.getElementById('question-area').classList.add('danger');
    }

    if (timeLeft <= 0) {
      clearInterval(tickId);
      submitAnswer();
    }
  }

  function tap(idx) {
    if (submitted) return;
    /* update highlight */
    for (let i = 0; i < 4; i++) c(i).classList.remove('selected');
    c(idx).classList.add('selected');
    selected = idx;
    submitAnswer();
  }

  function submitAnswer() {
    if (submitted) return;
    submitted = true;

    clearInterval(tickId);

    /* freeze question text animation */
    const qt = document.getElementById('question-text');
    qt.style.transform = getComputedStyle(qt).transform;
    qt.classList.remove('rushing');

    /* freeze progress bar */
    const pf = document.getElementById('progress-fill');
    pf.style.transition = 'none';
    pf.style.transform  = getComputedStyle(pf).transform;

    /* disable all choices */
    for (let i = 0; i < 4; i++) c(i).disabled = true;

    const q          = QUESTIONS[qIdx];
    const correctIdx = q.choices.indexOf(q.correct);
    const isCorrect  = (selected === correctIdx);

    if (isCorrect) score++;

    /* 最終問題の回答が確定した時点でタイムアタックの計測を終了 */
    if (qIdx >= QUESTIONS.length - 1) {
      endTime = Date.now();
    }

    /* reveal correct / wrong */
    c(correctIdx).classList.add('correct');
    if (!isCorrect) {
      c(selected).classList.remove('selected');
      c(selected).classList.add('wrong');
    }

    /* wait 1.5 s, then transition */
    setTimeout(() => {
      if (qIdx >= QUESTIONS.length - 1) {
        showResult();
      } else {
        showBetween(isCorrect);
      }
    }, 1500);
  }

  function showBetween(isCorrect) {
    showScreen('between-screen');

    const q   = QUESTIONS[qIdx];
    const vEl = document.getElementById('between-verdict');
    const aEl = document.getElementById('between-answer');

    if (isCorrect) {
      vEl.textContent = '正解！';
      vEl.className   = 'between-verdict v-correct';
      aEl.textContent = '';
    } else {
      vEl.textContent = '不正解…';
      vEl.className   = 'between-verdict v-wrong';
      aEl.textContent = `正解: ${q.correct}`;
    }

    let cnt = 5;
    document.getElementById('between-countdown').textContent = cnt;

    clearInterval(betweenId);
    betweenId = setInterval(() => {
      cnt--;
      document.getElementById('between-countdown').textContent = cnt;
      if (cnt <= 0) {
        clearInterval(betweenId);
        qIdx++;
        showQuestion();
      }
    }, 1000);
  }

  function showResult() {
    showScreen('result-screen');
    document.getElementById('result-score').textContent = score;
    document.getElementById('result-denom').textContent = `/ ${QUESTIONS.length} 問`;

    /* タイムアタック: ゲーム開始〜最終問題の回答終了までの時間(秒・小数第二桁) */
    const elapsedSec = Math.round(((endTime - startTime) / 1000) * 100) / 100;
    const totalScore = score * 100 - elapsedSec;

    document.getElementById('result-time').textContent = `回答時間: ${elapsedSec.toFixed(2)} 秒`;
    document.getElementById('result-total').textContent = totalScore.toFixed(2);

    saveRankingEntry({
      id: currentUserId,
      name: currentUserName,
      score: score,
      elapsedSec: elapsedSec,
      total: totalScore,
      date: Date.now()
    });
  }

  /* ===== INIT ===== */
  initRegister();
</script>
</body>
</html>
