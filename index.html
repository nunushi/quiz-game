<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>迫りくるクイズ</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d1a;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      color: white;
      touch-action: manipulation;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #start-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
      padding: 0 28px;
      text-align: center;
    }

    .game-title {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #a78bfa 30%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .game-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.6;
    }

    .btn-primary {
      margin-top: 24px;
      padding: 16px 52px;
      font-size: 1.25rem;
      font-weight: bold;
      font-family: inherit;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 6px 28px rgba(124,58,237,0.5);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-primary:active { transform: scale(0.96); box-shadow: 0 3px 14px rgba(124,58,237,0.4); }

    .btn-secondary {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: bold;
      font-family: inherit;
      background: transparent;
      color: #a78bfa;
      border: 2px solid #7c3aed;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: transform 0.12s, background 0.12s;
    }
    .btn-secondary:active { transform: scale(0.96); background: rgba(124,58,237,0.15); }
  </style>
</head>
<body>

<div id="start-screen" class="screen">
  <div class="game-title">迫りくるクイズ</div>
  <div class="game-sub">
    プレイ方法を選んでください。<br>
    出題を進行する方は「ホスト」、<br>
    クイズに答える方は「プレイヤー」を選んでください。
  </div>
  <button class="btn-primary" onclick="location.href='host.html'">ホストとしてはじめる</button>
  <button class="btn-secondary" onclick="location.href='player.html'">プレイヤーとして参加する</button>
</div>

</body>
</html>
