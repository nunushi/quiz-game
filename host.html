<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>迫りくるクイズ - ホスト</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d1a;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      color: white;
      touch-action: manipulation;
    }

    /* ===== SCREENS ===== */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .screen.hidden { display: none; }

    /* ===== START ===== */
    #start-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
      padding: 0 28px;
      text-align: center;
    }

    .game-title {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #a78bfa 30%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .game-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.6;
    }

    .btn-primary {
      margin-top: 24px;
      padding: 16px 52px;
      font-size: 1.25rem;
      font-weight: bold;
      font-family: inherit;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 6px 28px rgba(124,58,237,0.5);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-primary:active { transform: scale(0.96); box-shadow: 0 3px 14px rgba(124,58,237,0.4); }

    .btn-secondary {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: bold;
      font-family: inherit;
      background: transparent;
      color: #a78bfa;
      border: 2px solid #7c3aed;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: transform 0.12s, background 0.12s;
    }
    .btn-secondary:active { transform: scale(0.96); background: rgba(124,58,237,0.15); }

    /* ===== PASSWORD SCREEN ===== */
    #password-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
      padding: 0 28px;
      text-align: center;
    }

    .password-input {
      width: 100%;
      max-width: 280px;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.08em;
      color: white;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 14px 10px;
      outline: none;
    }
    .password-input:focus { border-color: #818cf8; }

    .password-error {
      color: #f87171;
      font-size: 0.85rem;
      min-height: 1.2em;
    }

    /* ===== PROGRESS (出題中) SCREEN ===== */
    #progress-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 18px;
    }

    .host-phase-label {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
      font-weight: bold;
    }
    .host-q-counter {
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: 900;
      color: #a78bfa;
      letter-spacing: 0.05em;
    }
    .host-question-text {
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      font-weight: bold;
      text-align: center;
      max-width: 88%;
      line-height: 1.5;
      padding: 0 20px;
    }
    .host-timer {
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 900;
      color: #818cf8;
      text-shadow: 0 0 30px rgba(129,140,248,0.6);
      line-height: 1;
    }

    /* ===== RANKING SCREEN ===== */
    #ranking-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 10px;
      padding: 20px 12px 16px;
      justify-content: flex-start;
    }

    .ranking-panels {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 680px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .ranking-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .ranking-panel-title {
      font-size: 0.78rem;
      font-weight: bold;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.1em;
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    .ranking-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 0;
    }

    .ranking-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 7px 8px;
    }
    .ranking-rank {
      width: 20px;
      flex: 0 0 auto;
      font-weight: 900;
      font-size: 0.85rem;
      text-align: center;
      color: rgba(255,255,255,0.5);
    }
    .ranking-row:nth-child(1) .ranking-rank { color: #fbbf24; }
    .ranking-row:nth-child(2) .ranking-rank { color: #d1d5db; }
    .ranking-row:nth-child(3) .ranking-rank { color: #f59e0b; }

    .ranking-name {
      flex: 1;
      min-width: 0;
      font-weight: bold;
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    .ranking-score {
      flex: 0 0 auto;
      font-weight: 900;
      font-size: 0.82rem;
      color: #a78bfa;
    }

    .ranking-empty {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      padding: 24px 0;
      text-align: center;
    }

    /* ===== GLOBAL ERROR BANNER ===== */
    #global-error {
      position: fixed;
      left: 0; right: 0; bottom: 18px;
      display: flex;
      justify-content: center;
      z-index: 50;
      pointer-events: none;
    }
    #global-error.hidden { display: none; }
    #global-error .bubble {
      background: rgba(239,68,68,0.95);
      color: white;
      font-size: 0.82rem;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 30px;
      max-width: 88%;
      text-align: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<!-- ===== GLOBAL ERROR BANNER ===== -->
<div id="global-error" class="hidden">
  <div class="bubble" id="global-error-text"></div>
</div>

<!-- ===== PASSWORD SCREEN ===== -->
<div id="password-screen" class="screen">
  <div class="game-title" style="font-size:clamp(1.5rem,6vw,2.2rem)">ホスト認証</div>
  <div class="game-sub">パスワードを入力してください。</div>
  <input type="password" id="password-input" class="password-input" placeholder="パスワード" autocomplete="off" onkeydown="if(event.key==='Enter') checkPassword()">
  <div class="password-error" id="password-error"></div>
  <button class="btn-primary" onclick="checkPassword()">入室する</button>
</div>

<!-- ===== START (HOST CONTROL) SCREEN ===== -->
<div id="start-screen" class="screen hidden">
  <div class="game-title">迫りくるクイズ</div>
  <div class="game-sub">
    ホスト用コントローラーです。<br>
    「開始」を押すと全プレイヤーの画面に出題が始まります。
  </div>
  <button class="btn-primary" onclick="startHostGame()">開始</button>
  <button class="btn-secondary" onclick="showHostRanking()">ランキングを見る</button>
</div>

<!-- ===== PROGRESS SCREEN (出題中) ===== -->
<div id="progress-screen" class="screen hidden">
  <div class="host-phase-label" id="host-phase-label">解答受付中</div>
  <div class="host-q-counter" id="host-q-counter">1 / 3</div>
  <div class="host-question-text" id="host-question-text"></div>
  <div class="host-timer" id="host-timer">20</div>
</div>

<!-- ===== RANKING SCREEN ===== -->
<div id="ranking-screen" class="screen hidden">
  <div class="game-title" style="font-size:clamp(1.5rem,6vw,2.2rem);margin-bottom:6px">ランキング</div>
  <div class="ranking-panels">
    <div class="ranking-panel">
      <div class="ranking-panel-title">個 人</div>
      <div class="ranking-list" id="ranking-list"></div>
    </div>
    <div class="ranking-panel">
      <div class="ranking-panel-title">チーム</div>
      <div class="ranking-list" id="team-ranking-list"></div>
    </div>
  </div>
  <button class="btn-primary" onclick="startHostGame()" style="margin-top:8px;flex-shrink:0">もう一度開始する</button>
  <button class="btn-secondary" onclick="showScreen('start-screen')" style="flex-shrink:0">開始画面に戻る</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  /* ===== FIREBASE ===== */
  const firebaseConfig = {
    apiKey: "AIzaSyAe8hXLZk0kL90o0iXccpqZM0_0KSFDCdg",
    authDomain: "quiz-ranking-eef9a.firebaseapp.com",
    projectId: "quiz-ranking-eef9a",
    storageBucket: "quiz-ranking-eef9a.firebasestorage.app",
    messagingSenderId: "562359055278",
    appId: "1:562359055278:web:215e3e12e4518873994e3f"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  /* ===== DATA (プレイヤー側と同一の内容を保持) ===== */
  const QUESTIONS = [
    {
      text: 'たかしくんの出身は？',
      choices: ['東京', '大阪', '名古屋', '札幌'],
      correct: '東京'
    },
    {
      text: '花子ちゃんの好きな食べ物は？',
      choices: ['寿司', '焼肉', 'うどん', 'そば'],
      correct: 'うどん'
    },
    {
      text: 'にしくんの趣味は？',
      choices: ['サッカー', '野球', 'テニス', 'スケート'],
      correct: 'スケート'
    }
  ];

  const QUESTION_DURATION = 20; // 出題1問あたりの解答時間（秒）
  const BETWEEN_DURATION  = 5;  // 正解発表～次の問題までの時間（秒）

  /* ===== SESSION（ホスト→プレイヤーへ進行を同期するための共有ドキュメント） ===== */
  const SESSION_REF = db.collection('sessions').doc('main');

  /* ===== RANKING (Firestore で全プレイヤー間で共有・既存と同じコレクション) ===== */
  const RANKING_COLLECTION = 'rankings';

  async function loadRankings() {
    try {
      const snap = await db.collection(RANKING_COLLECTION)
        .orderBy('total', 'desc')
        .limit(200)
        .get();
      return snap.docs.map(doc => {
        const d = doc.data();
        return {
          docId: doc.id,
          id:    d.id    !== undefined ? d.id    : doc.id,
          name:  d.name  !== undefined ? d.name  : '',
          team:  d.team  !== undefined ? d.team  : '',
          total: typeof d.total === 'number' ? d.total : 0,
          score: d.score,
          elapsedSec: d.elapsedSec,
          date:  d.date
        };
      });
    } catch (e) {
      console.error('ランキングの取得に失敗しました', e);
      return null;
    }
  }

  function renderRankingMessage(text, listId) {
    const listEl = document.getElementById(listId);
    listEl.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'ranking-empty';
    msg.textContent = text;
    listEl.appendChild(msg);
  }

  function computeTeamRanking(entries) {
    const bestByUser = {};
    for (const entry of entries) {
      if (!entry.team) continue;
      const key = entry.id;
      if (!bestByUser[key] || entry.total > bestByUser[key].total) bestByUser[key] = entry;
    }
    const teams = {};
    for (const entry of Object.values(bestByUser)) {
      const t = entry.team;
      if (!teams[t]) teams[t] = { team: t, sum: 0, count: 0 };
      teams[t].sum += entry.total;
      teams[t].count++;
    }
    return Object.values(teams)
      .filter(t => t.count > 0)
      .map(t => ({ team: t.team, avg: t.sum / t.count, count: t.count }))
      .sort((a, b) => b.avg - a.avg);
  }

  function buildRankingRow(rank, nameText, scoreText) {
    const row = document.createElement('div');
    row.className = 'ranking-row';
    const rankEl = document.createElement('span');
    rankEl.className = 'ranking-rank';
    rankEl.textContent = rank;
    const nameEl = document.createElement('span');
    nameEl.className = 'ranking-name';
    nameEl.textContent = nameText;
    const scoreEl = document.createElement('span');
    scoreEl.className = 'ranking-score';
    scoreEl.textContent = scoreText;
    row.append(rankEl, nameEl, scoreEl);
    return row;
  }

  async function showHostRanking() {
    showScreen('ranking-screen');
    renderRankingMessage('読み込み中…', 'ranking-list');
    renderRankingMessage('読み込み中…', 'team-ranking-list');

    const list = await loadRankings();

    if (list === null) {
      renderRankingMessage('取得に失敗しました', 'ranking-list');
      renderRankingMessage('取得に失敗しました', 'team-ranking-list');
      return;
    }

    /* --- 個人ランキング --- */
    const indivEl = document.getElementById('ranking-list');
    const bestIndiv = {};
    for (const entry of list) {
      const key = entry.id || entry.docId;
      if (!bestIndiv[key] || entry.total > bestIndiv[key].total) bestIndiv[key] = entry;
    }
    const indivList = Object.values(bestIndiv).sort((a, b) => b.total - a.total).slice(0, 50);

    if (indivList.length === 0) {
      renderRankingMessage('まだ記録がありません', 'ranking-list');
    } else {
      indivEl.innerHTML = '';
      indivList.forEach((entry, i) => {
        const displayName = (entry.name || '名無しさん') + (entry.team ? ` [${entry.team}]` : '');
        indivEl.appendChild(buildRankingRow(i + 1, displayName, entry.total.toFixed(1)));
      });
    }

    /* --- チームランキング --- */
    const teamEl = document.getElementById('team-ranking-list');
    const teamList = computeTeamRanking(list);

    if (teamList.length === 0) {
      renderRankingMessage('チーム未設定', 'team-ranking-list');
    } else {
      teamEl.innerHTML = '';
      teamList.forEach((t, i) => {
        const label = `チーム${t.team}(${t.count}人)`;
        teamEl.appendChild(buildRankingRow(i + 1, label, t.avg.toFixed(1)));
      });
    }
  }

  /* ===== HELPERS ===== */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function showGlobalError(msg) {
    document.getElementById('global-error-text').textContent = msg;
    document.getElementById('global-error').classList.remove('hidden');
  }
  function clearGlobalError() {
    document.getElementById('global-error').classList.add('hidden');
  }

  /* ===== HOST AUTH ===== */
  const HOST_PASSWORD = 'admin1';

  function checkPassword() {
    const input = document.getElementById('password-input');
    if (input.value === HOST_PASSWORD) {
      document.getElementById('password-error').textContent = '';
      showScreen('start-screen');
    } else {
      document.getElementById('password-error').textContent = 'パスワードが正しくありません。';
      input.value = '';
      input.focus();
    }
  }

  /* ===== HOST GAME FLOW ===== */
  let hostQIdx   = 0;
  let hostTickId = null;

  async function startHostGame() {
    const runId = `run_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    hostQIdx = 0;

    try {
      await SESSION_REF.set({
        status: 'running',
        phase: 'question',
        runId: runId,
        currentQuestionIndex: 0,
        phaseStartedAtMs: Date.now(),
        totalQuestions: QUESTIONS.length,
        questionDuration: QUESTION_DURATION,
        betweenDuration: BETWEEN_DURATION
      });
    } catch (e) {
      console.error('セッションの作成に失敗しました', e);
      showGlobalError('ゲームを開始できませんでした（Firestoreの権限設定を確認してください）: ' + e.message);
      return;
    }

    clearGlobalError();
    showScreen('progress-screen');
    runQuestionPhase();
  }

  function renderHostProgress() {
    document.getElementById('host-q-counter').textContent = `${hostQIdx + 1} / ${QUESTIONS.length}`;
    document.getElementById('host-question-text').textContent = QUESTIONS[hostQIdx].text;
    document.getElementById('host-phase-label').textContent = '解答受付中';
  }

  function updateHostTimer(sec) {
    document.getElementById('host-timer').textContent = Math.max(sec, 0);
  }

  function runQuestionPhase() {
    renderHostProgress();
    let remaining = QUESTION_DURATION;
    updateHostTimer(remaining);

    clearInterval(hostTickId);
    hostTickId = setInterval(() => {
      remaining--;
      updateHostTimer(remaining);
      if (remaining <= 0) {
        clearInterval(hostTickId);
        if (hostQIdx >= QUESTIONS.length - 1) {
          /* 最終問題はインターバルを経由せず、そのままリザルトへ */
          finishHostGame();
        } else {
          runBetweenPhase();
        }
      }
    }, 1000);
  }

  function runBetweenPhase() {
    SESSION_REF.update({ phase: 'between', phaseStartedAtMs: Date.now() })
      .catch(e => { console.error('進行の更新に失敗しました', e); showGlobalError('進行の更新に失敗しました: ' + e.message); });
    document.getElementById('host-phase-label').textContent = '正解発表中';

    let remaining = BETWEEN_DURATION;
    updateHostTimer(remaining);

    clearInterval(hostTickId);
    hostTickId = setInterval(() => {
      remaining--;
      updateHostTimer(remaining);
      if (remaining <= 0) {
        clearInterval(hostTickId);
        advanceQuestion();
      }
    }, 1000);
  }

  function advanceQuestion() {
    if (hostQIdx >= QUESTIONS.length - 1) {
      finishHostGame();
      return;
    }
    hostQIdx++;
    SESSION_REF.update({
      phase: 'question',
      currentQuestionIndex: hostQIdx,
      phaseStartedAtMs: Date.now()
    }).catch(e => { console.error('進行の更新に失敗しました', e); showGlobalError('進行の更新に失敗しました: ' + e.message); });
    runQuestionPhase();
  }

  function finishHostGame() {
    SESSION_REF.update({ status: 'finished' })
      .catch(e => { console.error('終了処理に失敗しました', e); showGlobalError('終了処理に失敗しました: ' + e.message); });
    clearInterval(hostTickId);
    /* プレイヤー側が自身のランキング送信を完了するのを少し待つ */
    setTimeout(showHostRanking, 1500);
  }
</script>
</body>
</html>
