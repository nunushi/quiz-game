<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>迫りくるクイズ - プレイヤー</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d1a;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      color: white;
      touch-action: manipulation;
    }

    /* ===== SCREENS ===== */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .screen.hidden { display: none; }

    /* ===== WAITING ===== */
    #waiting-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
    }

    .game-title {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #a78bfa 30%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .game-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.6;
    }

    .btn-primary {
      margin-top: 24px;
      padding: 16px 52px;
      font-size: 1.25rem;
      font-weight: bold;
      font-family: inherit;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 6px 28px rgba(124,58,237,0.5);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-primary:active { transform: scale(0.96); box-shadow: 0 3px 14px rgba(124,58,237,0.4); }

    .btn-secondary {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: bold;
      font-family: inherit;
      background: transparent;
      color: #a78bfa;
      border: 2px solid #7c3aed;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: transform 0.12s, background 0.12s;
    }
    .btn-secondary:active { transform: scale(0.96); background: rgba(124,58,237,0.15); }

    /* ===== REGISTER SCREEN ===== */
    #register-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
      padding: 0 28px;
      text-align: center;
    }

    .reg-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 360px;
    }
    .reg-block.hidden { display: none; }

    .user-id-box {
      font-family: 'Courier New', monospace;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: bold;
      letter-spacing: 0.08em;
      color: #fbbf24;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(167,139,250,0.4);
      border-radius: 14px;
      padding: 16px 20px;
      width: 100%;
      word-break: break-all;
    }

    .recover-input {
      width: 100%;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: white;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 14px 10px;
      outline: none;
    }
    .recover-input:focus { border-color: #818cf8; }

    .reg-switch {
      margin-top: 4px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      text-decoration: underline;
      cursor: pointer;
    }

    .current-id-display {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    /* ===== GAME SCREEN ===== */
    #game-screen {
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }

    /* --- Question area (top ~44%) --- */
    .question-area {
      flex: 0 0 44%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(180deg, #0f1a3d 0%, #131c38 100%);
      overflow: hidden;
      transition: box-shadow 0.4s;
    }
    .question-area.danger {
      box-shadow: inset 0 0 60px rgba(239,68,68,0.25);
      animation: dangerPulse 0.6s ease-in-out infinite;
    }
    @keyframes dangerPulse {
      0%,100% { box-shadow: inset 0 0 40px rgba(239,68,68,0.15); }
      50%      { box-shadow: inset 0 0 70px rgba(239,68,68,0.35); }
    }

    /* Timer label — above question text, hidden until ≤5s */
    .timer-label {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(2.2rem, 9vw, 3.8rem);
      font-weight: 900;
      color: #ff4444;
      text-shadow: 0 0 25px rgba(255,68,68,0.9), 0 0 55px rgba(255,68,68,0.4);
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
      z-index: 5;
    }
    .timer-label.show {
      opacity: 1;
      animation: timerBeat 0.55s ease-in-out infinite;
    }
    @keyframes timerBeat {
      0%,100% { transform: translateX(-50%) scale(1);   }
      50%      { transform: translateX(-50%) scale(1.12); }
    }

    /* Question counter top-right */
    .q-counter {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      font-weight: bold;
      z-index: 5;
    }

    /* Persistent remaining-time badge, top-left (keeps showing after submit) */
    .q-timer {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      font-weight: bold;
      background: rgba(255,255,255,0.08);
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 5;
    }

    /* Question text with rush animation */
    .question-text {
      font-size: clamp(1.15rem, 4.5vw, 1.7rem);
      font-weight: bold;
      text-align: center;
      padding: 16px 28px;
      line-height: 1.45;
      transform-origin: center center;
      max-width: 92%;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    @keyframes questionRush {
      from {
        transform: scale(0.6);
        opacity: 1;
      }
      to {
        transform: scale(3.2);
        opacity: 1;
      }
    }
    .question-text.rushing {
      animation: questionRush 20s linear forwards;
    }

    /* Progress bar */
    .progress-wrap {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 5px;
      background: rgba(255,255,255,0.08);
    }
    .progress-fill {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, #7c3aed, #3b82f6, #ef4444);
    }

    /* --- Submit bar (between question and choices) --- */
    .submit-bar {
      flex: 0 0 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      padding: 6px 16px;
    }
    .btn-submit {
      width: 100%;
      max-width: 360px;
      padding: 12px 0;
      font-size: 1.05rem;
      font-weight: bold;
      font-family: inherit;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 18px rgba(124,58,237,0.45);
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
    }
    .btn-submit:active:not(:disabled) { transform: scale(0.96); }
    .btn-submit:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
    }

    /* --- Choices area (remaining space) --- */
    .choices-area {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      background: #0d0d1a;
    }

    .choice-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      color: white;
      font-size: clamp(1rem, 4vw, 1.25rem);
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 6px;
      transition: background 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .choice-btn:active:not(:disabled) { transform: scale(0.95); }

    .choice-btn.selected {
      background: rgba(99,102,241,0.38);
      border-color: #818cf8;
      box-shadow: 0 0 22px rgba(99,102,241,0.55), inset 0 0 12px rgba(99,102,241,0.2);
    }
    .choice-btn.correct {
      background: rgba(16,185,129,0.45);
      border-color: #34d399;
      box-shadow: 0 0 28px rgba(16,185,129,0.65);
    }
    .choice-btn.wrong {
      background: rgba(239,68,68,0.38);
      border-color: #f87171;
      box-shadow: 0 0 22px rgba(239,68,68,0.5);
    }
    .choice-btn:disabled { cursor: default; }

    /* ===== BETWEEN SCREEN ===== */
    #between-screen {
      background: radial-gradient(ellipse at 50% 45%, #1a1a3e 0%, #0d0d1a 65%);
      gap: 10px;
    }

    .between-verdict {
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 0.04em;
    }
    .v-correct { color: #34d399; text-shadow: 0 0 30px rgba(52,211,153,0.7); }
    .v-wrong   { color: #f87171; text-shadow: 0 0 30px rgba(248,113,113,0.7); }

    .between-answer {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      text-align: center;
      min-height: 1.4em;
    }

    .between-next-label {
      margin-top: 16px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    .between-countdown {
      font-size: clamp(3.5rem, 14vw, 6rem);
      font-weight: 900;
      color: #818cf8;
      text-shadow: 0 0 30px rgba(129,140,248,0.6);
    }

    /* ===== RESULT SCREEN ===== */
    #result-screen {
      background: radial-gradient(ellipse at 50% 45%, #1a1a3e 0%, #0d0d1a 65%);
      gap: 8px;
    }

    .result-title {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.05em;
    }
    .result-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
    }
    .result-score {
      font-size: clamp(5rem, 22vw, 9rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #fbbf24, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-denom {
      font-size: 1.4rem;
      color: rgba(255,255,255,0.38);
      margin-top: -4px;
    }
    .result-time {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }
    .result-total-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      margin-top: 16px;
    }
    .result-total {
      font-size: clamp(2.6rem, 10vw, 4rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== RANKING SCREEN ===== */
    #ranking-screen {
      background: radial-gradient(ellipse at 50% 40%, #1e1e4a 0%, #0d0d1a 65%);
      gap: 14px;
      padding: 16px 20px;
    }

    .ranking-list {
      width: 100%;
      max-width: 340px;
      max-height: 56vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ranking-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 14px;
    }
    .ranking-rank {
      width: 26px;
      flex: 0 0 auto;
      font-weight: 900;
      font-size: 1rem;
      text-align: center;
      color: rgba(255,255,255,0.5);
    }
    .ranking-row:nth-child(1) .ranking-rank { color: #fbbf24; }
    .ranking-row:nth-child(2) .ranking-rank { color: #d1d5db; }
    .ranking-row:nth-child(3) .ranking-rank { color: #f59e0b; }

    .ranking-name {
      flex: 1;
      min-width: 0;
      font-weight: bold;
      font-size: 0.92rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    .ranking-score {
      flex: 0 0 auto;
      font-weight: 900;
      font-size: 1.05rem;
      color: #a78bfa;
    }

    .ranking-empty {
      color: rgba(255,255,255,0.4);
      font-size: 0.95rem;
      padding: 40px 0;
    }

    /* ===== GLOBAL ERROR BANNER ===== */
    #global-error {
      position: fixed;
      left: 0; right: 0; bottom: 18px;
      display: flex;
      justify-content: center;
      z-index: 50;
      pointer-events: none;
    }
    #global-error.hidden { display: none; }
    #global-error .bubble {
      background: rgba(239,68,68,0.95);
      color: white;
      font-size: 0.82rem;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 30px;
      max-width: 88%;
      text-align: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<!-- ===== GLOBAL ERROR BANNER ===== -->
<div id="global-error" class="hidden">
  <div class="bubble" id="global-error-text"></div>
</div>

<!-- ===== REGISTER SCREEN ===== -->
<div id="register-screen" class="screen">
  <div class="game-title" style="font-size:clamp(1.5rem,6vw,2.2rem)">ユーザー登録</div>

  <!-- 初回: 新規ID発行 -->
  <div id="reg-new" class="reg-block hidden">
    <div class="game-sub">
      あなたの専用IDを発行しました。<br>
      次回以降はこのIDで復旧できます。<br>
      必ずメモ・スクリーンショットで保存してください。
    </div>
    <div class="user-id-box" id="reg-new-id"></div>
    <button class="btn-secondary" onclick="copyId('reg-new-id')">IDをコピー</button>
    <input type="text" id="reg-new-name" class="recover-input" style="text-transform:none" placeholder="ユーザー名を入力（任意）" maxlength="12" autocomplete="off">
    <button class="btn-primary" onclick="confirmNewUser()" style="padding:16px 30px;font-size:1.05rem">登録してはじめる</button>
    <div class="reg-switch" onclick="showRecoverMode()">すでにIDをお持ちの方はこちら</div>
  </div>

  <!-- 既存ユーザー -->
  <div id="reg-existing" class="reg-block hidden">
    <div class="game-sub">登録済みのIDが見つかりました。</div>
    <div class="user-id-box" id="reg-existing-id"></div>
    <input type="text" id="reg-existing-name" class="recover-input" style="text-transform:none" placeholder="ユーザー名を入力（任意）" maxlength="12" autocomplete="off">
    <button class="btn-primary" onclick="continueAsExisting()" style="padding:16px 30px;font-size:1.05rem">このIDで続ける</button>
    <div class="reg-switch" onclick="showRecoverMode()">別のIDを使う</div>
  </div>

  <!-- 復旧コード入力 -->
  <div id="reg-recover" class="reg-block hidden">
    <div class="game-sub">お手持ちの復旧コード（ユーザーID）を入力してください。</div>
    <input type="text" id="recover-input" class="recover-input" placeholder="例: QZ-AB12-CD34" autocomplete="off" autocapitalize="characters">
    <input type="text" id="reg-recover-name" class="recover-input" style="text-transform:none" placeholder="ユーザー名を入力（任意）" maxlength="12" autocomplete="off">
    <button class="btn-primary" onclick="recoverUser()" style="padding:16px 30px;font-size:1.05rem">このIDで復旧する</button>
    <div class="reg-switch" onclick="showFreshMode()">新しいIDを発行する</div>
  </div>
</div>

<!-- ===== WAITING SCREEN ===== -->
<div id="waiting-screen" class="screen hidden">
  <div class="game-title">迫りくるクイズ</div>
  <div class="game-sub" id="waiting-message">
    ホストが「開始」を押すと<br>ここに問題が表示されます。
  </div>
  <div class="current-id-display" id="current-id-display"></div>
  <button class="btn-secondary" onclick="showRanking('waiting-screen')">ランキングを見る</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen hidden">
  <div class="question-area" id="question-area">
    <div class="timer-label" id="timer-label">5</div>
    <span class="q-counter" id="q-counter">1 / 3</span>
    <span class="q-timer" id="q-timer">20</span>
    <div class="question-text" id="question-text"></div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="submit-bar">
    <button class="btn-submit" id="submit-btn" onclick="submitAnswer()">回答を提出する</button>
  </div>
  <div class="choices-area">
    <button class="choice-btn" id="c0" onclick="tap(0)"></button>
    <button class="choice-btn" id="c1" onclick="tap(1)"></button>
    <button class="choice-btn" id="c2" onclick="tap(2)"></button>
    <button class="choice-btn" id="c3" onclick="tap(3)"></button>
  </div>
</div>

<!-- ===== BETWEEN SCREEN ===== -->
<div id="between-screen" class="screen hidden">
  <div class="between-verdict" id="between-verdict"></div>
  <div class="between-answer" id="between-answer"></div>
  <div class="between-next-label">次の問題まで…</div>
  <div class="between-countdown" id="between-countdown">5</div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-screen" class="screen hidden">
  <div class="result-title">あなたの結果</div>
  <div class="result-label">正 答 数</div>
  <div class="result-score" id="result-score">0</div>
  <div class="result-denom" id="result-denom">/ 3 問</div>
  <div class="result-time" id="result-time"></div>
  <div class="result-total-label">総 合 点</div>
  <div class="result-total" id="result-total">0</div>
  <button class="btn-primary" onclick="showScreen('waiting-screen')" style="margin-top:28px">待機画面に戻る</button>
  <button class="btn-secondary" onclick="showRanking('result-screen')">ランキングを見る</button>
</div>

<!-- ===== RANKING SCREEN ===== -->
<div id="ranking-screen" class="screen hidden">
  <div class="game-title" style="font-size:clamp(1.5rem,6vw,2.2rem)">ランキング</div>
  <div class="ranking-list" id="ranking-list"></div>
  <button class="btn-primary" onclick="showScreen(rankingOrigin)" style="margin-top:8px">戻る</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  /* ===== FIREBASE ===== */
  const firebaseConfig = {
    apiKey: "AIzaSyAe8hXLZk0kL90o0iXccpqZM0_0KSFDCdg",
    authDomain: "quiz-ranking-eef9a.firebaseapp.com",
    projectId: "quiz-ranking-eef9a",
    storageBucket: "quiz-ranking-eef9a.firebasestorage.app",
    messagingSenderId: "562359055278",
    appId: "1:562359055278:web:215e3e12e4518873994e3f"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  /* ===== DATA (ホスト側と同一の内容を保持) ===== */
  const QUESTIONS = [
    {
      text: 'たかしくんの出身は？',
      choices: ['東京', '大阪', '名古屋', '札幌'],
      correct: '東京'
    },
    {
      text: '花子ちゃんの好きな食べ物は？',
      choices: ['寿司', '焼肉', 'うどん', 'そば'],
      correct: 'うどん'
    },
    {
      text: 'にしくんの趣味は？',
      choices: ['サッカー', '野球', 'テニス', 'スケート'],
      correct: 'スケート'
    }
  ];

  /* ===== SESSION（ホストが進行を書き込み、プレイヤーはこれを購読する） ===== */
  const SESSION_REF = db.collection('sessions').doc('main');

  /* ===== RANKING (Firestore で全プレイヤー間で共有) ===== */
  const RANKING_COLLECTION = 'rankings';

  async function loadRankings() {
    try {
      const snap = await db.collection(RANKING_COLLECTION)
        .orderBy('total', 'desc')
        .limit(50)
        .get();
      return snap.docs.map(doc => doc.data());
    } catch (e) {
      console.error('ランキングの取得に失敗しました', e);
      return null;
    }
  }

  async function saveRankingEntry(entry) {
    try {
      await db.collection(RANKING_COLLECTION).add(entry);
    } catch (e) {
      console.error('ランキングの送信に失敗しました', e);
    }
  }

  function renderRankingMessage(text) {
    const listEl = document.getElementById('ranking-list');
    listEl.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'ranking-empty';
    msg.textContent = text;
    listEl.appendChild(msg);
  }

  let rankingOrigin = 'waiting-screen'; // ランキング画面の「戻る」先

  async function showRanking(origin) {
    rankingOrigin = origin;
    renderRankingMessage('読み込み中…');
    showScreen('ranking-screen');

    const list = await loadRankings();
    const listEl = document.getElementById('ranking-list');

    if (list === null) {
      renderRankingMessage('ランキングの取得に失敗しました');
      return;
    }
    if (list.length === 0) {
      renderRankingMessage('まだ記録がありません');
      return;
    }

    listEl.innerHTML = '';
    list.forEach((entry, i) => {
      const row = document.createElement('div');
      row.className = 'ranking-row';

      const rank = document.createElement('span');
      rank.className = 'ranking-rank';
      rank.textContent = `${i + 1}`;

      const name = document.createElement('span');
      name.className = 'ranking-name';
      name.textContent = entry.name;

      const total = document.createElement('span');
      total.className = 'ranking-score';
      total.textContent = entry.total.toFixed(2);

      row.append(rank, name, total);
      listEl.appendChild(row);
    });
  }

  /* ===== USER REGISTRATION ===== */
  const USER_ID_KEY   = 'quiz_user_id';
  const USER_NAME_KEY = 'quiz_user_name';
  let currentUserId   = null;
  let currentUserName = '';
  let pendingNewId    = null;

  function genUserId() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 紛らわしい文字(0,O,1,I)を除外
    const seg = () => Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    return `QZ-${seg()}-${seg()}`;
  }

  function regBlock(id) {
    document.querySelectorAll('.reg-block').forEach(b => b.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function initRegister() {
    const existing = localStorage.getItem(USER_ID_KEY);
    if (existing) {
      currentUserId = existing;
      document.getElementById('reg-existing-id').textContent = existing;
      document.getElementById('reg-existing-name').value = localStorage.getItem(USER_NAME_KEY) || '';
      regBlock('reg-existing');
    } else {
      pendingNewId = genUserId();
      document.getElementById('reg-new-id').textContent = pendingNewId;
      regBlock('reg-new');
    }
  }

  function showRecoverMode() {
    regBlock('reg-recover');
    document.getElementById('recover-input').value = '';
    document.getElementById('reg-recover-name').value = '';
    document.getElementById('recover-input').focus();
  }

  function showFreshMode() {
    pendingNewId = genUserId();
    document.getElementById('reg-new-id').textContent = pendingNewId;
    regBlock('reg-new');
  }

  function copyId(elId) {
    const text = document.getElementById(elId).textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).catch(() => {});
    }
  }

  function finishRegistration(id, name) {
    currentUserId   = id;
    currentUserName = name.trim().slice(0, 12) || '名無しさん';
    localStorage.setItem(USER_ID_KEY, currentUserId);
    localStorage.setItem(USER_NAME_KEY, currentUserName);
    document.getElementById('current-id-display').textContent = `${currentUserName}（ID: ${currentUserId}）`;
    showScreen('waiting-screen');
    listenSession();
  }

  function confirmNewUser() {
    finishRegistration(pendingNewId, document.getElementById('reg-new-name').value);
  }
  function continueAsExisting() {
    finishRegistration(currentUserId, document.getElementById('reg-existing-name').value);
  }

  function recoverUser() {
    const val = document.getElementById('recover-input').value.trim().toUpperCase();
    if (!val) {
      alert('復旧コードを入力してください。');
      return;
    }
    finishRegistration(val, document.getElementById('reg-recover-name').value);
  }

  /* ===== HELPERS ===== */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function showGlobalError(msg) {
    document.getElementById('global-error-text').textContent = msg;
    document.getElementById('global-error').classList.remove('hidden');
  }
  function clearGlobalError() {
    document.getElementById('global-error').classList.add('hidden');
  }

  function c(i) { return document.getElementById('c' + i); }

  /* ===== PLAYER STATE (ホストのセッションに同期して進行) ===== */
  let sessionListenerStarted = false;
  let seenRunId        = null;
  let processedPhaseKey = null;
  let finalizedRunId   = null;

  let myQIdx          = -1;
  let myScore         = 0;
  let myElapsedSec     = 0;
  let mySubmitted      = false;
  let mySelected       = 0;
  let myPhaseStartedAtMs = null;
  let myQuestionDuration = 20;
  let myBetweenDuration  = 5;
  let myTotalQuestions   = QUESTIONS.length;
  let localTickId        = null;
  let displayTickId       = null; // 残り時間バッジ用（提出後も止めない）

  function listenSession() {
    if (sessionListenerStarted) return;
    sessionListenerStarted = true;
    SESSION_REF.onSnapshot(snap => {
      clearGlobalError();
      if (!snap.exists) {
        showScreen('waiting-screen');
        return;
      }
      handleSessionUpdate(snap.data());
    }, err => {
      console.error('セッションの監視に失敗しました', err);
      showGlobalError('ホストとの接続に失敗しました（Firestoreの権限設定を確認してください）: ' + err.message);
    });
  }

  function handleSessionUpdate(data) {
    if (data.runId !== seenRunId) {
      /* 新しいゲームが開始された：自分のスコアをリセット */
      seenRunId      = data.runId;
      processedPhaseKey = null;
      finalizedRunId = null;
      myQIdx         = -1;
      myScore        = 0;
      myElapsedSec    = 0;
    }

    myQuestionDuration = data.questionDuration || 20;
    myBetweenDuration  = data.betweenDuration  || 5;
    myTotalQuestions   = data.totalQuestions   || QUESTIONS.length;

    if (data.status === 'finished') {
      clearInterval(localTickId);
      clearInterval(displayTickId);
      if (finalizedRunId !== data.runId) {
        finalizedRunId = data.runId;
        finalizeResult();
      }
      return;
    }

    if (data.status !== 'running') {
      clearInterval(localTickId);
      clearInterval(displayTickId);
      showScreen('waiting-screen');
      return;
    }

    const key = `${data.runId}:${data.currentQuestionIndex}:${data.phase}`;
    if (key === processedPhaseKey) return; // 重複した通知は無視
    processedPhaseKey = key;

    if (data.phase === 'question') {
      enterQuestion(data.currentQuestionIndex, data.phaseStartedAtMs);
    } else if (data.phase === 'between') {
      enterBetween(data.currentQuestionIndex, data.phaseStartedAtMs);
    }
  }

  function enterQuestion(qIdx, phaseStartedAtMs) {
    myQIdx  = qIdx;
    mySubmitted = false;
    mySelected  = 0;
    myPhaseStartedAtMs = phaseStartedAtMs;

    const q = QUESTIONS[qIdx];
    showScreen('game-screen');
    document.getElementById('q-counter').textContent = `${qIdx + 1} / ${myTotalQuestions}`;

    const qt = document.getElementById('question-text');
    qt.textContent = q.text;
    qt.classList.remove('rushing');
    void qt.offsetWidth; // force reflow

    document.getElementById('question-area').classList.remove('danger');

    for (let i = 0; i < 4; i++) {
      const el = c(i);
      el.textContent = q.choices[i];
      el.className   = 'choice-btn';
      el.disabled    = false;
    }
    c(0).classList.add('selected');

    const sb = document.getElementById('submit-btn');
    sb.disabled = false;
    sb.textContent = '回答を提出する';

    const tl = document.getElementById('timer-label');
    tl.textContent = '';
    tl.classList.remove('show');

    /* ホストの開始時刻からの経過を踏まえて残り時間を計算（参加タイミングのズレを吸収） */
    const elapsedAlready = (Date.now() - phaseStartedAtMs) / 1000;
    const remainingNow   = Math.max(myQuestionDuration - elapsedAlready, 0.1);

    const pf = document.getElementById('progress-fill');
    pf.style.transition = 'none';
    pf.style.transform  = `scaleX(${Math.min(remainingNow / myQuestionDuration, 1)})`;
    void pf.offsetWidth;
    pf.style.transition = `transform ${remainingNow}s linear`;
    pf.style.transform  = 'scaleX(0)';

    qt.classList.add('rushing');

    /* 残り時間バッジ：提出後も止めず、出題フェーズが終わるまで表示し続ける */
    const qTimerEl = document.getElementById('q-timer');
    qTimerEl.textContent = Math.max(Math.ceil(remainingNow), 0);
    clearInterval(displayTickId);
    displayTickId = setInterval(() => {
      const left = Math.ceil(myQuestionDuration - (Date.now() - myPhaseStartedAtMs) / 1000);
      qTimerEl.textContent = Math.max(left, 0);
      if (left <= 0) clearInterval(displayTickId);
    }, 1000);

    clearInterval(localTickId);
    localTickId = setInterval(() => {
      const left = Math.ceil(myQuestionDuration - (Date.now() - myPhaseStartedAtMs) / 1000);
      if (left <= 5 && left > 0) {
        const tl2 = document.getElementById('timer-label');
        tl2.textContent = left;
        tl2.classList.add('show');
        document.getElementById('question-area').classList.add('danger');
      }
      if (left <= 0) {
        clearInterval(localTickId);
        if (!mySubmitted) recordAnswer(mySelected);
      }
    }, 1000);
  }

  function tap(idx) {
    if (mySubmitted) return;
    for (let i = 0; i < 4; i++) c(i).classList.remove('selected');
    c(idx).classList.add('selected');
    mySelected = idx;
  }

  function submitAnswer() {
    if (mySubmitted) return;
    recordAnswer(mySelected);
  }

  function recordAnswer(idx) {
    if (mySubmitted) return;
    mySubmitted = true;
    clearInterval(localTickId);

    const sb = document.getElementById('submit-btn');
    sb.disabled = true;
    sb.textContent = '提出済み';

    /* 出題アニメーション・プログレスバーを停止 */
    const qt = document.getElementById('question-text');
    qt.style.transform = getComputedStyle(qt).transform;
    qt.classList.remove('rushing');

    const pf = document.getElementById('progress-fill');
    pf.style.transition = 'none';
    pf.style.transform  = getComputedStyle(pf).transform;

    for (let i = 0; i < 4; i++) c(i).disabled = true;

    const q          = QUESTIONS[myQIdx];
    const correctIdx = q.choices.indexOf(q.correct);
    const isCorrect  = (idx === correctIdx);
    if (isCorrect) myScore++;

    const timeTaken = Math.min(myQuestionDuration, Math.max(0, (Date.now() - myPhaseStartedAtMs) / 1000));
    myElapsedSec += timeTaken;

    c(correctIdx).classList.add('correct');
    if (!isCorrect) {
      c(idx).classList.remove('selected');
      c(idx).classList.add('wrong');
    }
  }

  function enterBetween(qIdx, phaseStartedAtMs) {
    /* このタイミングでまだ出題画面を経由していない場合のフォールバック（タイムアウト扱い） */
    if (myQIdx !== qIdx) {
      myQIdx = qIdx;
      myPhaseStartedAtMs = phaseStartedAtMs - myQuestionDuration * 1000;
      mySubmitted = false;
      mySelected  = 0;
    }
    if (!mySubmitted) {
      recordAnswer(mySelected);
    }

    showScreen('between-screen');

    const q   = QUESTIONS[qIdx];
    const correctIdx = q.choices.indexOf(q.correct);
    const isCorrect  = (mySelected === correctIdx);
    const vEl = document.getElementById('between-verdict');
    const aEl = document.getElementById('between-answer');

    if (isCorrect) {
      vEl.textContent = '正解！';
      vEl.className   = 'between-verdict v-correct';
      aEl.textContent = '';
    } else {
      vEl.textContent = '不正解…';
      vEl.className   = 'between-verdict v-wrong';
      aEl.textContent = `正解: ${q.correct}`;
    }

    clearInterval(localTickId);
    clearInterval(displayTickId);
    const update = () => {
      const left = Math.ceil(myBetweenDuration - (Date.now() - phaseStartedAtMs) / 1000);
      document.getElementById('between-countdown').textContent = Math.max(left, 0);
    };
    update();
    localTickId = setInterval(update, 1000);
  }

  function finalizeResult() {
    showScreen('result-screen');
    document.getElementById('result-score').textContent = myScore;
    document.getElementById('result-denom').textContent = `/ ${myTotalQuestions} 問`;

    const totalScore = myScore * 100 - myElapsedSec;
    document.getElementById('result-time').textContent = `解答時間合計: ${myElapsedSec.toFixed(2)} 秒`;
    document.getElementById('result-total').textContent = totalScore.toFixed(2);

    saveRankingEntry({
      id: currentUserId,
      name: currentUserName,
      score: myScore,
      elapsedSec: myElapsedSec,
      total: totalScore,
      date: Date.now()
    });
  }

  /* ===== INIT ===== */
  initRegister();
</script>
</body>
</html>
